name: get_typed_router
description:
  Type-safe, annotation-based route generation for GetX.
  Annotate your pages with @AppRoute, run the CLI generator, and get a fully
  typed AppRouter with type-safe navigation and strongly-typed argument passing.
  No build_runner required.
version: 0.0.1
homepage: https://github.com/BogneStanley/get_typed_router
repository: https://github.com/BogneStanley/get_typed_router
issue_tracker: https://github.com/BogneStanley/get_typed_router/issues
documentation: https://github.com/BogneStanley/get_typed_router#readme

topics:
  - getx
  - routing
  - code-generation
  - navigation
  - type-safe

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  analyzer: ^8.1.1
  yaml: ^3.1.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

executables:
  get_typed_router:
    main: bin/get_typed_router.dart
